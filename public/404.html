<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Page not found · Techi Champs</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --cream:#f3eee1; --ink:#151311; --coral:#ff5a4f; --yellow:#ffcf2e; --paper:#faf6ec; }
      body {
        font-family: 'Space Mono', monospace;
        background: var(--cream); color: var(--ink);
        min-height: 100vh; display: grid; place-items: center;
        padding: 24px; text-align: center;
      }
      .wrap { max-width: 640px; }
      .tag {
        display: inline-block; font-weight: 700; font-size: .72rem; letter-spacing: .22em;
        text-transform: uppercase; background: var(--yellow); border: 2.5px solid var(--ink);
        padding: 6px 12px; margin-bottom: 22px;
      }
      h1 {
        font-family: 'Anton', sans-serif; font-size: clamp(6rem, 26vw, 15rem);
        line-height: .82; letter-spacing: .01em;
        color: var(--coral); -webkit-text-stroke: 2px var(--ink);
      }
      h2 {
        font-family: 'Anton', sans-serif; font-size: clamp(1.6rem, 6vw, 3rem);
        text-transform: uppercase; margin: 6px 0 16px;
      }
      p { font-size: .95rem; line-height: 1.6; color: #2b2723; max-width: 42ch; margin: 0 auto 30px; }
      .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
      a.btn {
        font-weight: 700; font-size: .8rem; letter-spacing: .1em; text-transform: uppercase;
        text-decoration: none; color: var(--ink); background: var(--coral);
        border: 2.5px solid var(--ink); padding: 13px 22px; box-shadow: 4px 4px 0 var(--ink);
        transition: transform .14s ease, box-shadow .14s ease;
      }
      a.btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--ink); }
      a.btn--ghost { background: var(--paper); }
      .links { margin-top: 28px; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; }
      .links a { color: var(--ink); opacity: .7; text-decoration: none; margin: 0 8px; }
      .links a:hover { opacity: 1; color: var(--coral); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="tag">✳ Lost in space</span>
      <h1>404</h1>
      <h2>Page not found</h2>
      <p>This page took a detour. But bold ideas are just a click away — let's get you back on track.</p>
      <div class="btns">
        <a class="btn" href="/">← Back home</a>
        <a class="btn btn--ghost" href="/contact">Contact us</a>
      </div>
      <nav class="links">
        <a href="/about">About</a><a href="/services">Services</a><a href="/work">Work</a><a href="/process">Process</a><a href="/reviews">Reviews</a>
      </nav>
    </main>
  </body>
</html>
